<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Team Yellow - Independence Run</title>
    <style>
        /* RADIKALER SCROLL-STOPP */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* Verhindert Scrollbars */
            position: fixed; /* Fixiert den gesamten Viewport */
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior: none; /* Stoppt Pull-to-refresh auf Android/iOS */
            -webkit-overflow-scrolling: none;
        }

        #game-container {
            position: relative;
            background: #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            touch-action: none; /* Sagt dem Browser: Ich kontrolliere die Touches! */
        }

        #loading-overlay {
            position: absolute;
            color: #FFD700;
            font-family: 'Arial Black', sans-serif;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="loading-overlay">LADE TEAM YELLOW...</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- DYNAMISCHE SKALIERUNG (Wichtig für Mobile!) ---
function resize() {
    const ratio = 1080 / 1920;
    let w = window.innerWidth;
    let h = window.innerHeight;
    
    if (w / h > ratio) {
        w = h * ratio;
    } else {
        h = w / ratio;
    }
    
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    document.getElementById('game-container').style.width = w + 'px';
    document.getElementById('game-container').style.height = h + 'px';
}
window.addEventListener('resize', resize);
resize();

// Interne Auflösung bleibt immer HD
canvas.width = 1080;
canvas.height = 1920;

// --- VARIABLEN ---
let gameState = 'LOADING', score = 0, playerHP = 3, bossHP = 10;
let currentLevel = 1, playerLane = 1, selectedGender = 'm';
let gameSpeed = 16, backgroundY = 0, frameCount = 0;
const channelLink = "https://whatsapp.com/channel/0029Vakref7E50Uf6qbO6545";

const images = {};
const audio = {};
let loaded = 0;
const assetNames = [
    'bg1', 'bg2', 'bg3', 'bg4', 'runner_m', 'runner_f', 'agent', 'boss',
    'gate', 'proj_ty', 'sc_start', 'sc_gameover', 'sc_victory', 'ui_hp', 'ui_score', 'fx_shadow'
];

function loadAssets() {
    const imgData = {
        bg1: 'bg_1.png', bg2: 'bg_2.png', bg3: 'bg_3.png', bg4: 'bg_4.png',
        runner_m: 'runner_m.png', runner_f: 'runner_f.png',
        agent: 'enemy_agent.png', boss: 'boss_ceo.png',
        gate: 'item_gate.png', proj_ty: 'proj_ty.png',
        sc_start: 'sc_start.png', sc_gameover: 'sc_gameover.png', sc_victory: 'sc_victory.png',
        ui_hp: 'ui_hp.png', ui_score: 'ui_score.png', fx_shadow: 'fx_shadow.png'
    };

    for (let key in imgData) {
        images[key] = new Image();
        images[key].onload = () => { loaded++; checkDone(); };
        images[key].src = imgData[key];
    }

    audio.main = new Audio('music_main_loop.mp3');
    audio.win = new Audio('music_victory.mp3');
    audio.lose = new Audio('music_gameover.mp3');
    audio.main.loop = true;
}

function checkDone() {
    if (loaded >= assetNames.length) {
        document.getElementById('loading-overlay').style.display = 'none';
        gameState = 'START';
    }
}
loadAssets();

let obstacles = [], projectiles = [];

// --- STEUERUNG (Touch-Fix) ---
function handleInput(e) {
    if(e.cancelable) e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
    const clientY = (e.touches ? e.touches[0].clientY : e.clientY);
    
    const x = (clientX - rect.left) * (canvas.width / rect.width);
    const y = (clientY - rect.top) * (canvas.height / rect.height);

    if (gameState === 'START') {
        if (y < 1600) {
            selectedGender = (x < 540) ? 'm' : 'f';
            startGame();
        } else { window.open(channelLink, '_blank'); }
    } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        if (x < 360) playerLane = 0;
        else if (x > 720) playerLane = 2;
        else playerLane = 1;
        
        if (gameState === 'BOSS') projectiles.push({lane: playerLane, y: 1500});
    } else if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
        location.reload(); // Sauberster Reset
    }
}

canvas.addEventListener('touchstart', handleInput, {passive: false});
canvas.addEventListener('mousedown', handleInput);

function startGame() {
    gameState = 'PLAYING';
    score = 0; currentLevel = 1; playerHP = 3; bossHP = 10;
    obstacles = []; projectiles = [];
    audio.main.play().catch(() => { console.log("Audio braucht User-Interaktion"); });
}

function update() {
    if (gameState === 'PLAYING' || gameState === 'BOSS') {
        backgroundY = (backgroundY + gameSpeed/2) % 1920;
        frameCount++;

        if (frameCount % 60 === 0) {
            let type = (gameState === 'BOSS') ? 'arrow' : (Math.random() > 0.4 ? 'gate' : 'agent');
            obstacles.push({type: type, lane: Math.floor(Math.random()*3), y: -300});
        }

        obstacles.forEach((o, i) => {
            o.y += gameSpeed;
            if (o.y > 1400 && o.y < 1700 && o.lane === playerLane) {
                if (o.type === 'gate') { score += 20; obstacles.splice(i, 1); }
                else if (o.type === 'agent') { score = Math.max(0, score - 10); obstacles.splice(i, 1); }
                else if (o.type === 'arrow') { 
                    playerHP--; obstacles.splice(i, 1);
                    if(playerHP <= 0) { gameState = 'GAMEOVER'; audio.main.pause(); audio.lose.play(); }
                }
            }
            if (o.y > 2000) obstacles.splice(i, 1);
        });

        projectiles.forEach((p, i) => {
            p.y -= 40;
            if (p.y < 400 && p.lane === 1) { // Boss in der Mitte
                bossHP--; projectiles.splice(i, 1);
                if (bossHP <= 0) { gameState = 'VICTORY'; audio.main.pause(); audio.win.play(); }
            }
            if (p.y < -100) projectiles.splice(i, 1);
        });

        if (gameState === 'PLAYING') {
            if (score >= 100 && currentLevel === 1) currentLevel = 2;
            else if (score >= 250 && currentLevel === 2) currentLevel = 3;
            else if (score >= 500 && currentLevel === 3) { gameState = 'BOSS'; obstacles = []; }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Wichtig: Alten Frame löschen!

    if (gameState === 'START') {
        ctx.drawImage(images.sc_start, 0, 0, 1080, 1920);
    } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        let bg = (gameState === 'BOSS') ? images.bg4 : images['bg' + currentLevel];
        ctx.drawImage(bg, 0, backgroundY, 1080, 1920);
        ctx.drawImage(bg, 0, backgroundY - 1920, 1080, 1920);

        if (gameState === 'BOSS') {
            ctx.drawImage(images.boss, 340, 200, 400, 400);
            ctx.fillStyle = "red"; ctx.fillRect(340, 150, 40 * bossHP, 20); // Boss Balken
        }

        ctx.drawImage(images.fx_shadow, 360 * playerLane + 80, 1650, 200, 100);
        let char = selectedGender === 'm' ? images.runner_m : images.runner_f;
        ctx.drawImage(char, 360 * playerLane + 50, 1400, 260, 320);

        obstacles.forEach(o => {
            let img = o.type === 'gate' ? images.gate : images.agent;
            ctx.drawImage(img, 360 * o.lane + 55, o.y, 250, 250);
        });

        projectiles.forEach(p => ctx.drawImage(images.proj_ty, 360 * p.lane + 130, p.y, 100, 200));

        let ui = (gameState === 'BOSS') ? images.ui_hp : images.ui_score;
        let val = (gameState === 'BOSS') ? playerHP : score;
        ctx.drawImage(ui, 50, 50, 400, 150);
        ctx.fillStyle = "black"; ctx.font = "bold 65px Arial"; ctx.textAlign = "center";
        ctx.fillText(val, 285, 148);
    } else if (gameState === 'GAMEOVER') {
        ctx.drawImage(images.sc_gameover, 0, 0, 1080, 1920);
    } else if (gameState === 'VICTORY') {
        ctx.drawImage(images.sc_victory, 0, 0, 1080, 1920);
    }
    requestAnimationFrame(draw);
}

// Start
draw();
setInterval(update, 1000/60);
</script>
</body>
</html>
