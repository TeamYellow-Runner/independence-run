<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta property="og:title" content="Team Yellow: Independence Run">
    <meta property="og:description" content="Sammle Kollegen, weiche Agenten aus und vertreibe Gegenargumente mit der Kraft der Solidarität! Jetzt spielen.">
    <meta property="og:image" content="https://teamyellow-runner.github.io/independence-run/preview_thumb.png">
    <meta property="og:url" content="https://teamyellow-runner.github.io/independence-run/">
    <meta property="og:type" content="website">

    <title>Team Yellow - Independence Run</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; -webkit-user-select: none; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden !important; position: fixed; background-color: #000; display: flex; justify-content: center; align-items: center; }
        #game-container { position: relative; width: 100vw; height: 177.78vw; max-width: 56.25vh; max-height: 100vh; background: #111; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,1); }
        canvas { width: 100%; height: 100%; display: block; }
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #FFD700; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: 'Arial Black', sans-serif; font-size: 30px; z-index: 2000; text-align: center; }
    </style>
</head>
<body scroll="no">
    <div id="game-container">
        <div id="loading-overlay">LADE TEAM YELLOW...<br><span id="percent">0%</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1080; canvas.height = 1920;

// --- PERSPEKTIV-KONSTANTEN ---
const HORIZON_Y = 880; 
const SPAWN_Y = 850; 
const PLAYER_Y = 1600; 
const LANE_SPREAD = 500; 

// --- GLOBALE VARIABLEN ---
let gameState = 'LOADING'; // LOADING, INTRO, START, TUTORIAL, PLAYING, BOSS_ALERT, BOSS, etc.
let difficulty = 'PROFI';
let score = 0, playerHP = 3, bossHP = 10;
let currentLevel = 1, playerLane = 1, bossLane = 1, selectedGender = 'm';
let frameCount = 0, timeLeft = 0, gameSpeedFactor = 0.007;
let visualX = 540; 

const channelLink = "https://whatsapp.com/channel/0029Vakref7E50Uf6qbO6545";

const config = {
    ENTSPANNT: { speedMod: 0.005, hp: 5, goals: [100, 250, 500], times: [60, 75, 90], bossHP: 3, agentDensity: 100 },
    PROFI: { speedMod: 0.008, hp: 3, goals: [150, 400, 800], times: [45, 60, 75], bossHP: 10, agentDensity: 75 }
};

const images = {}, audio = {};
let loadedAssets = 0;
const assets = {
    sc_intro: 'sc_intro.png', sc_start: 'sc_start.png',
    sc_victory_clean: 'sc_victory_clean.png', sc_victory_menu: 'sc_victory_menu.png',
    sc_gameover_clean: 'sc_gameover_clean.png', sc_gameover_menu: 'sc_gameover_menu.png',
    bg1: 'bg_1.png', bg2: 'bg_2.png', bg3: 'bg_3.png', bg4: 'bg_4.png',
    runner_m: 'runner_m.png', runner_f: 'runner_f.png',
    agent: 'enemy_agent.png', boss: 'boss_ceo.png',
    gate: 'item_gate.png', proj_ty: 'proj_ty.png', proj_syn: 'proj_syn.png',
    ui_hp: 'ui_hp.png', ui_score: 'ui_score.png', fx_shadow: 'fx_shadow.png'
};

function initLoad() {
    const total = Object.keys(assets).length;
    for (let key in assets) {
        images[key] = new Image();
        images[key].onload = () => {
            loadedAssets++;
            document.getElementById('percent').innerText = Math.floor((loadedAssets/total)*100) + "%";
            if(loadedAssets >= total) {
                setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; gameState = 'INTRO'; }, 800);
            }
        };
        images[key].src = assets[key];
    }
    audio.main = new Audio('music_main_loop.mp3'); audio.main.loop = true;
    audio.win = new Audio('music_victory.mp3'); audio.lose = new Audio('music_gameover.mp3');
}
initLoad();

let obstacles = [], projectiles = [], bossProjectiles = [];
let touchStartX = 0, touchStartY = 0;
const swipeThreshold = 50;

function handleEnd(e) {
    if(e.cancelable) e.preventDefault();
    const c = e.changedTouches ? e.changedTouches[0] : e;
    const diffX = c.clientX - touchStartX;
    const rect = canvas.getBoundingClientRect();
    const x = (c.clientX - rect.left) * (canvas.width / rect.width);
    const y = (c.clientY - rect.top) * (canvas.height / rect.height);

    if (gameState === 'INTRO') {
        difficulty = (x < 540) ? 'ENTSPANNT' : 'PROFI';
        audio.main.play().catch(() => {});
        gameState = 'START';
    } 
    else if (gameState === 'START') {
        if (y < 1550) { 
            selectedGender = (x < 540) ? 'm' : 'f'; 
            gameState = 'TUTORIAL'; // WECHSEL ZUM TUTORIAL
        }
        else { window.open(channelLink, '_blank'); }
    } 
    else if (gameState === 'TUTORIAL') {
        startRun(); // STARTET DAS EIGENTLICHE SPIEL
    }
    else if (gameState === 'BOSS_ALERT') {
        gameState = 'BOSS'; 
    }
    else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        if (Math.abs(diffX) > swipeThreshold) {
            if (diffX > 0 && playerLane < 2) playerLane++; 
            else if (diffX < 0 && playerLane > 0) playerLane--; 
        } else if (gameState === 'BOSS') {
            projectiles.push({lane: playerLane, y: 1500});
        }
    } 
    else if (gameState === 'VICTORY_CLEAN') gameState = 'VICTORY_MENU';
    else if (gameState === 'GAMEOVER_CLEAN') gameState = 'GAMEOVER_MENU';
    else if (gameState === 'VICTORY_MENU') {
        if (y < 640) location.reload();
        else if (y < 1280) window.open(channelLink, '_blank');
        else shareGame();
    }
    else if (gameState === 'GAMEOVER_MENU') {
        if (y < 960) location.reload();
        else window.open(channelLink, '_blank');
    }
}

canvas.addEventListener('touchstart', (e) => { const t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY; }, {passive: false});
canvas.addEventListener('touchend', handleEnd, {passive: false});
canvas.addEventListener('mousedown', (e) => { touchStartX = e.clientX; touchStartY = e.clientY; });
canvas.addEventListener('mouseup', handleEnd);

function startRun() {
    const c = config[difficulty];
    gameState = 'PLAYING';
    score = 0; currentLevel = 1; 
    playerHP = c.hp; bossHP = c.bossHP;
    gameSpeedFactor = c.speedMod;
    timeLeft = c.times[0];
    obstacles = []; projectiles = []; bossProjectiles = [];
}

function shareGame() {
    const text = `🚀 *Independence Run: Team Yellow braucht DICH!* 🚀\n\nWir haben als geschlossene Gemeinschaft den Endgegner vertrieben! 🏆 Bist du dabei?\n\nSpiel hier mit: ${window.location.href}\n\nGemeinsam sind wir unschlagbar! 💪🟨`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function update() {
    if (gameState === 'PLAYING' || gameState === 'BOSS') {
        frameCount++;
        const c = config[difficulty];
        let targetX = 540 + (playerLane - 1) * LANE_SPREAD;
        visualX += (targetX - visualX) * 0.2; 

        if (gameState === 'PLAYING') {
            timeLeft -= 1/60;
            if (timeLeft <= 0) { gameState = 'GAMEOVER_CLEAN'; audio.main.pause(); audio.lose.play(); }
            if (frameCount % c.agentDensity === 0) {
                let type = (Math.random() > 0.4) ? 'gate' : 'agent';
                obstacles.push({type, lane: Math.floor(Math.random()*3), progress: 0});
            }
            if (score >= c.goals[currentLevel-1]) {
                if (currentLevel < 3) { currentLevel++; timeLeft = c.times[currentLevel-1]; gameSpeedFactor += 0.001; }
                else { gameState = 'BOSS_ALERT'; obstacles = []; }
            }
        }

        if (gameState === 'BOSS') {
            if (frameCount % 85 === 0) bossLane = Math.floor(Math.random()*3);
            if (frameCount % 70 === 0) bossProjectiles.push({lane: bossLane, progress: 0});
        }

        obstacles.forEach((o, i) => {
            o.progress += gameSpeedFactor;
            if (o.progress > 0.85 && o.progress < 0.95 && o.lane === playerLane) {
                if (o.type === 'gate') { score += 20; obstacles.splice(i, 1); }
                else { score = Math.max(0, score - 25); obstacles.splice(i, 1); }
            }
            if (o.progress >= 1.1) obstacles.splice(i, 1);
        });

        bossProjectiles.forEach((bp, i) => {
            bp.progress += gameSpeedFactor + 0.005;
            if (bp.progress > 0.85 && bp.progress < 0.95 && bp.lane === playerLane) {
                playerHP--; bossProjectiles.splice(i, 1);
                if(playerHP <= 0) { gameState = 'GAMEOVER_CLEAN'; audio.main.pause(); audio.lose.play(); }
            }
            if (bp.progress >= 1.1) bossProjectiles.splice(i, 1);
        });

        projectiles.forEach((p, i) => {
            p.y -= 45;
            if (gameState === 'BOSS' && p.y < 500 && p.lane === bossLane) {
                bossHP--; projectiles.splice(i, 1);
                if (bossHP <= 0) { gameState = 'VICTORY_CLEAN'; audio.main.pause(); audio.win.play(); }
            }
            if (p.y < -100) projectiles.splice(i, 1);
        });
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (gameState === 'INTRO') ctx.drawImage(images.sc_intro, 0, 0, 1080, 1920);
    else if (gameState === 'START') ctx.drawImage(images.sc_start, 0, 0, 1080, 1920);
    
    // --- TUTORIAL OVERLAY ---
    else if (gameState === 'TUTORIAL') {
        ctx.drawImage(images.bg1, 0, 0, 1080, 1920);
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, 1080, 1920);
        
        ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 10;
        ctx.strokeRect(80, 400, 920, 1100);

        ctx.fillStyle = "#FFD700"; ctx.font = "bold 70px Arial"; ctx.textAlign = "center";
        ctx.fillText("SO WIRD GESPIELT", 540, 520);

        // Icons & Erklärungen
        ctx.drawImage(images.gate, 200, 600, 200, 200);
        ctx.fillStyle = "#00FF00"; ctx.font = "bold 50px Arial"; ctx.textAlign = "left";
        ctx.fillText("SAMMELN (+20)", 450, 720);

        ctx.drawImage(images.agent, 200, 850, 200, 200);
        ctx.fillStyle = "#FF0000"; ctx.fillText("AUSWEICHEN (-25)", 450, 970);

        ctx.fillStyle = "white"; ctx.font = "40px Arial"; ctx.textAlign = "center";
        ctx.fillText("Wische nach LINKS oder RECHTS", 540, 1150);
        ctx.fillText("um die Spur zu wechseln.", 540, 1210);

        ctx.fillStyle = "#FFD700"; ctx.font = "bold 60px Arial";
        ctx.fillText("[ TIPPE ZUM STARTEN ]", 540, 1400);
    }

    else if (gameState === 'PLAYING' || gameState === 'BOSS' || gameState === 'BOSS_ALERT') {
        let bg = (gameState === 'BOSS' || gameState === 'BOSS_ALERT') ? images.bg4 : images['bg' + currentLevel];
        ctx.drawImage(bg, 0, 0, 1080, 1920);
        
        if (gameState === 'BOSS') {
            ctx.drawImage(images.boss, 540 + (bossLane - 1) * 360 - 200, 180, 400, 400);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(340, 130, 400, 25);
            ctx.fillStyle = "#FFD700"; ctx.fillRect(340, 130, (400 / config[difficulty].bossHP) * bossHP, 25);
        }

        obstacles.forEach(o => {
            let size = 300 * o.progress;
            let drawX = 540 + (o.lane - 1) * LANE_SPREAD * o.progress;
            let drawY = HORIZON_Y + (PLAYER_Y - HORIZON_Y) * o.progress;
            ctx.drawImage(o.type === 'gate' ? images.gate : images.agent, drawX - size/2, drawY - size/2, size, size);
        });

        bossProjectiles.forEach(bp => {
            let size = 250 * bp.progress;
            let drawX = 540 + (bp.lane - 1) * LANE_SPREAD * bp.progress;
            let drawY = 400 + (PLAYER_Y - 400) * bp.progress;
            ctx.drawImage(images.proj_syn, drawX - size/2, drawY - size/2, size, size);
        });

        projectiles.forEach(p => {
            ctx.drawImage(images.proj_ty, 540 + (p.lane - 1) * LANE_SPREAD - 50, p.y, 100, 200);
        });

        ctx.drawImage(images.fx_shadow, visualX - 100, 1650, 200, 100);
        ctx.drawImage(images['runner_' + selectedGender], visualX - 140, 1380, 280, 340);

        let ui = (gameState === 'BOSS' || gameState === 'BOSS_ALERT') ? images.ui_hp : images.ui_score;
        ctx.drawImage(ui, 50, 50, 400, 150);
        ctx.fillStyle = "black"; ctx.font = "bold 70px Arial"; ctx.textAlign = "center";
        ctx.fillText((gameState === 'BOSS' || gameState === 'BOSS_ALERT' ? playerHP : score), 285, 148);

        if (gameState === 'PLAYING') {
            ctx.textAlign = "right"; ctx.font = "bold 65px Arial";
            ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
            ctx.fillStyle = timeLeft < 10 ? "#FF4444" : "white";
            ctx.fillText("ZEIT: " + Math.ceil(timeLeft) + "s", 1000, 145);
            ctx.shadowBlur = 0; 
        }

        if (gameState === 'BOSS_ALERT') {
            ctx.fillStyle = "rgba(0,0,0,0.92)";
            ctx.fillRect(0, 0, 1080, 1920);
            ctx.strokeStyle = "#FFD700"; ctx.lineWidth = 10;
            ctx.strokeRect(80, 520, 920, 880); 
            ctx.fillStyle = "#FFD700"; ctx.font = "bold 60px Arial"; ctx.textAlign = "center";
            ctx.fillText("✨ GEMEINSAM SIND WIR STARK!", 540, 650); 
            ctx.fillStyle = "white"; ctx.font = "38px Arial";
            const lines = ["Ihr habt genug Kollegen versammelt!", "Als geschlossene Gemeinschaft seid ihr bereit.", "", "Setzt allen Gegenargumenten die Power", "eurer gelben Herzen entgegen.", "", "Tippe zum Senden von Solidarität!", "", "", "[ Tippe zum Starten ]"];
            lines.forEach((l, i) => ctx.fillText(l, 540, 770 + i * 52));
        }
    } 
    else if (gameState === 'VICTORY_CLEAN') ctx.drawImage(images.sc_victory_clean, 0, 0, 1080, 1920);
    else if (gameState === 'VICTORY_MENU') ctx.drawImage(images.sc_victory_menu, 0, 0, 1080, 1920);
    else if (gameState === 'GAMEOVER_CLEAN') ctx.drawImage(images.sc_gameover_clean, 0, 0, 1080, 1920);
    else if (gameState === 'GAMEOVER_MENU') ctx.drawImage(images.sc_gameover_menu, 0, 0, 1080, 1920);

    requestAnimationFrame(draw);
}
setInterval(update, 1000/60);
draw();
</script>
</body>
</html>
