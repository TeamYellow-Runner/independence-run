<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Yellow: Independence Run</title>
    <style>
        /* CSS: Verhindert Scrollen und optimiert die Darstellung auf Mobilgeräten */
        * { 
            box-sizing: border-box; 
            touch-action: none; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background-color: #111;
            display: flex; justify-content: center; align-items: center;
            position: fixed;
        }
        #game-container {
            width: 100vw; height: 177.78vw; 
            max-width: 56.25vh; max-height: 100vh;
            background: #000; position: relative;
        }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Interne Auflösung für scharfe Grafik (1080p Hochformat)
        canvas.width = 1080; 
        canvas.height = 1920;

        // --- SPIEL-ZUSTÄNDE & VARIABLEN ---
        let gameState = 'START'; 
        let currentLevel = 1;
        let score = 0;
        let playerHP = 3;
        let bossHP = 10;
        let playerLane = 1; // 0: Links, 1: Mitte, 2: Rechts
        let selectedGender = 'm';
        let gameSpeed = 15;
        let frameCount = 0;
        let backgroundY = 0;

        const channelLink = "https://whatsapp.com/channel/0029Vakref7E50Uf6qbO6545";

        // --- ASSETS LADEN ---
        const images = {};
        const audio = {};

        function loadAssets() {
            const imgList = {
                bg1: 'bg_1.png', bg2: 'bg_2.png', bg3: 'bg_3.png', bg4: 'bg_4.png',
                runner_m: 'runner_m.png', runner_f: 'runner_f.png',
                agent: 'enemy_agent.png', boss: 'boss_ceo.png',
                gate: 'item_gate.png', barrier: 'barrier_check.png',
                proj_syn: 'proj_syn.png', proj_ty: 'proj_ty.png',
                sc_start: 'sc_start.png', sc_gameover: 'sc_gameover.png', sc_victory: 'sc_victory.png',
                ui_hp: 'ui_hp.png', ui_score: 'ui_score.png', fx_shadow: 'fx_shadow.png'
            };
            for (let key in imgList) {
                images[key] = new Image();
                images[key].src = imgList[key];
            }
            audio.main = new Audio('music_main_loop.mp3');
            audio.win = new Audio('music_victory.mp3');
            audio.lose = new Audio('music_gameover.mp3');
            audio.main.loop = true;
        }

        loadAssets();

        let obstacles = [];
        let projectiles = [];

        // --- KLASSEN ---
        class Obstacle {
            constructor(type) {
                this.type = type; // 'gate', 'agent', 'arrow'
                this.lane = Math.floor(Math.random() * 3);
                this.y = -250;
                this.width = 250;
                this.height = 250;
            }
            update() {
                this.y += gameSpeed;
            }
            draw() {
                let img = this.type === 'gate' ? images.gate : (this.type === 'agent' ? images.agent : images.proj_syn);
                if (img.complete) {
                    ctx.drawImage(img, 360 * this.lane + 55, this.y, this.width, this.height);
                }
            }
        }

        // --- LOGIK-FUNKTIONEN ---
        function startGame() { 
            gameState = 'PLAYING'; 
            score = 0; 
            currentLevel = 1; 
            bossHP = 10;
            playerHP = 3;
            obstacles = [];
            projectiles = [];
            audio.main.play().catch(() => {}); 
        }

        function shareGame() {
            const gameUrl = window.location.href; 
            const shareText = `🚀 *Independence Run: Team Yellow braucht DICH!* 🚀\n\nIch habe gerade den Endboss besiegt! 🏆 Aber wahre Eigenständigkeit erreichen wir nur als Team. Bist du dabei?\n\nSpiel hier mit: ${gameUrl}\n\nGemeinsam sind wir unschlagbar! 💪🟨`;
            window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
        }

        function handleInput(e) {
            if(e.cancelable) e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);

            if (gameState === 'START') { 
                if (y < 1550) { 
                    selectedGender = (x < 540) ? 'm' : 'f'; 
                    startGame(); 
                } else { 
                    window.open(channelLink, '_blank'); 
                }
            }
            else if (gameState === 'BOSS') { 
                projectiles.push({lane: playerLane, y: 1500}); 
            }
            else if (gameState === 'GAMEOVER') {
                if (y > 1300 && y < 1600) location.reload();
                else if (y >= 1600) window.open(channelLink, '_blank');
            }
            else if (gameState === 'VICTORY') {
                if (y > 1100 && y < 1350) shareGame();
                else if (y >= 1350 && y < 1600) location.reload();
                else if (y >= 1600) window.open(channelLink, '_blank');
            }
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, {passive: false});

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && playerLane > 0) playerLane--;
            if (e.key === 'ArrowRight' && playerLane < 2) playerLane++;
            if (e.key === ' ' && gameState === 'BOSS') projectiles.push({lane: playerLane, y: 1500});
        });

        // --- HAUPT-LOOP ---
        function update() {
            if (gameState === 'PLAYING' || gameState === 'BOSS') {
                backgroundY = (backgroundY + gameSpeed/2) % 1920;
                frameCount++;

                // Hindernisse erzeugen
                let spawnRate = gameState === 'BOSS' ? 45 : 60;
                if (frameCount % spawnRate === 0) {
                    let type = gameState === 'BOSS' ? 'arrow' : (Math.random() > 0.4 ? 'gate' : 'agent');
                    obstacles.push(new Obstacle(type));
                }

                obstacles.forEach((obj, i) => {
                    obj.update();
                    // Kollisionsabfrage
                    if (obj.y > 1350 && obj.y < 1750 && obj.lane === playerLane) {
                        if (obj.type === 'gate') { 
                            score += 20; 
                            obstacles.splice(i, 1); 
                        }
                        else if (obj.type === 'agent') { 
                            score = Math.max(0, score - 10); 
                            obstacles.splice(i, 1); 
                        }
                        else if (obj.type === 'arrow') { 
                            playerHP--; 
                            obstacles.splice(i, 1); 
                            if(playerHP <= 0) { 
                                gameState = 'GAMEOVER'; 
                                audio.main.pause(); 
                                audio.lose.play(); 
                            } 
                        }
                    }
                    if (obj.y > 2000) obstacles.splice(i, 1);
                });

                // Eigene Schüsse (nur Boss-Level)
                projectiles.forEach((p, i) => {
                    p.y -= 40;
                    if (p.y < 400 && p.lane === 1) { // Boss sitzt in der Mitte
                        bossHP--; 
                        projectiles.splice(i, 1); 
                        if(bossHP <= 0) { 
                            gameState = 'VICTORY'; 
                            audio.main.pause(); 
                            audio.win.play(); 
                        } 
                    } else if (p.y < -100) {
                        projectiles.splice(i, 1);
                    }
                });

                // Level-Übergänge
                if (gameState === 'PLAYING') {
                    if (score >= 100 && currentLevel === 1) currentLevel = 2;
                    else if (score >= 250 && currentLevel === 2) currentLevel = 3;
                    else if (score >= 500 && currentLevel === 3) { 
                        gameState = 'BOSS'; 
                        playerHP = 3; 
                        obstacles = []; // Level leeren für Boss
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === 'START') {
                if(images.sc_start.complete) ctx.drawImage(images.sc_start, 0, 0, 1080, 1920);
            } 
            else if (gameState === 'PLAYING' || gameState === 'BOSS') {
                // Hintergrund (Looping)
                let bg = (gameState === 'BOSS') ? images.bg4 : images['bg' + currentLevel];
                if(bg && bg.complete) {
                    ctx.drawImage(bg, 0, backgroundY, 1080, 1920);
                    ctx.drawImage(bg, 0, backgroundY - 1920, 1080, 1920);
                }

                // --- ENDBOSS ANZEIGEN ---
                if (gameState === 'BOSS' && images.boss.complete) {
                    ctx.drawImage(images.boss, 340, 180, 400, 400); // Boss oben mittig
                    
                    // Lebensbalken Boss
                    ctx.fillStyle = "rgba(50, 50, 50, 0.8)"; 
                    ctx.fillRect(340, 150, 400, 20);
                    ctx.fillStyle = "#FF0000"; 
                    ctx.fillRect(340, 150, 40 * bossHP, 20);
                }

                // Schatten unter dem Spieler
                if(images.fx_shadow.complete) ctx.drawImage(images.fx_shadow, 360 * playerLane + 80, 1650, 200, 100);
                
                // Spielerfigur
                let runnerImg = selectedGender === 'm' ? images.runner_m : images.runner_f;
                if(runnerImg.complete) {
                    ctx.drawImage(runnerImg, 360 * playerLane + 50, 1400, 260, 320);
                }

                // Hindernisse zeichnen
                obstacles.forEach(o => o.draw());

                // Eigene Projektile zeichnen
                projectiles.forEach(p => {
                    if(images.proj_ty.complete) ctx.drawImage(images.proj_ty, 360 * p.lane + 130, p.y, 100, 200);
                });

                // UI Overlay
                if (gameState === 'PLAYING') {
                    if(images.ui_score.complete) ctx.drawImage(images.ui_score, 50, 50, 400, 150);
                    ctx.fillStyle = "black"; ctx.font = "bold 65px Arial"; 
                    ctx.textAlign = "center";
                    ctx.fillText(score, 285, 148);
                } else {
                    if(images.ui_hp.complete) ctx.drawImage(images.ui_hp, 50, 50, 400, 150);
                    ctx.fillStyle = "red"; ctx.font = "bold 65px Arial"; 
                    ctx.textAlign = "center";
                    ctx.fillText(playerHP, 285, 148);
                }
            } 
            else if (gameState === 'GAMEOVER') {
                if(images.sc_gameover.complete) ctx.drawImage(images.sc_gameover, 0, 0, 1080, 1920);
            } 
            else if (gameState === 'VICTORY') {
                if(images.sc_victory.complete) ctx.drawImage(images.sc_victory, 0, 0, 1080, 1920);
            }
            
            requestAnimationFrame(draw);
        }

        // Starte Spiel-Loop
        setInterval(update, 1000/60);
        draw();

    </script>
</body>
</html>
