<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Team Yellow: Independence Run</title>
    <style>
        /* ABSOLUTER SCROLL-STOPP */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* Verhindert Scrollbars */
            position: fixed; /* Friert den Screen ein */
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overscroll-behavior: none; /* Stoppt "Pull-to-refresh" auf Handys */
        }

        #game-container {
            width: 100vw; height: 177.78vw; 
            max-width: 56.25vh; max-height: 100vh;
            background: #111;
            position: relative;
        }

        canvas {
            width: 100%; height: 100%;
            display: block;
            touch-action: none; /* Sagt dem Browser: Finger weg von der Steuerung! */
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1080; canvas.height = 1920;

        // Spiel-Variablen
        let gameState = 'LOADING', score = 0, playerHP = 3, bossHP = 10;
        let currentLevel = 1, playerLane = 1, selectedGender = 'm';
        let gameSpeed = 15, frameCount = 0, backgroundY = 0;
        const channelLink = "https://whatsapp.com/channel/0029Vakref7E50Uf6qbO6545";

        const images = {};
        const audio = {};
        let loadedCount = 0;
        const totalAssets = 18; // 15 Bilder + 3 Sounds

        // --- ASSET LISTE ---
        function loadAssets() {
            const imgList = {
                bg1: 'bg_1.png', bg2: 'bg_2.png', bg3: 'bg_3.png', bg4: 'bg_4.png',
                runner_m: 'runner_m.png', runner_f: 'runner_f.png',
                agent: 'enemy_agent.png', boss: 'boss_ceo.png',
                gate: 'item_gate.png', proj_ty: 'proj_ty.png',
                sc_start: 'sc_start.png', sc_gameover: 'sc_gameover.png', sc_victory: 'sc_victory.png',
                ui_hp: 'ui_hp.png', ui_score: 'ui_score.png', fx_shadow: 'fx_shadow.png'
            };

            for (let key in imgList) {
                images[key] = new Image();
                images[key].onload = checkLoading;
                images[key].onerror = () => console.error("Bild fehlt: " + imgList[key]);
                images[key].src = imgList[key];
            }

            audio.main = new Audio('music_main_loop.mp3');
            audio.win = new Audio('music_victory.mp3');
            audio.lose = new Audio('music_gameover.mp3');
            [audio.main, audio.win, audio.lose].forEach(a => {
                a.oncanplaythrough = checkLoading;
                a.onerror = () => checkLoading(); // Ignorieren, falls Sound fehlt
            });
        }

        function checkLoading() {
            loadedCount++;
            if (loadedCount >= totalAssets) {
                gameState = 'START';
            }
        }

        loadAssets();

        let obstacles = [], projectiles = [];

        // Steuerung & Klick-Logik
        function handleInput(e) {
            if(e.cancelable) e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);

            if (gameState === 'START') {
                if (y < 1600) { selectedGender = x < 540 ? 'm' : 'f'; gameState = 'PLAYING'; audio.main.play().catch(()=>{}); }
                else { window.open(channelLink, '_blank'); }
            } else if (gameState === 'PLAYING') {
                if (x < 360) playerLane = 0; else if (x > 720) playerLane = 2; else playerLane = 1;
            } else if (gameState === 'BOSS') {
                if (x < 360) playerLane = 0; else if (x > 720) playerLane = 2; else playerLane = 1;
                projectiles.push({lane: playerLane, y: 1500});
            } else if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
                location.reload();
            }
        }

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, {passive: false});

        // --- ENGINE ---
        function update() {
            if (gameState === 'PLAYING' || gameState === 'BOSS') {
                backgroundY = (backgroundY + gameSpeed/2) % 1920;
                frameCount++;
                if (frameCount % 60 === 0) obstacles.push({type: gameState === 'BOSS' ? 'arrow' : (Math.random() > 0.4 ? 'gate' : 'agent'), lane: Math.floor(Math.random()*3), y: -200});
                
                obstacles.forEach((obj, i) => {
                    obj.y += gameSpeed;
                    if (obj.y > 1400 && obj.y < 1700 && obj.lane === playerLane) {
                        if (obj.type === 'gate') { score += 20; obstacles.splice(i, 1); }
                        else if (obj.type === 'agent') { score = Math.max(0, score - 10); obstacles.splice(i, 1); }
                        else if (obj.type === 'arrow') { playerHP--; obstacles.splice(i, 1); if(playerHP <= 0) { gameState = 'GAMEOVER'; audio.main.pause(); audio.lose.play(); }}
                    }
                    if (obj.y > 2000) obstacles.splice(i, 1);
                });

                projectiles.forEach((p, i) => {
                    p.y -= 40;
                    if (p.y < 400 && p.lane === 1) { bossHP--; projectiles.splice(i, 1); if(bossHP <= 0) { gameState = 'VICTORY'; audio.main.pause(); audio.win.play(); }}
                    else if (p.y < -100) projectiles.splice(i, 1);
                });

                if (gameState === 'PLAYING' && score >= 500) { gameState = 'BOSS'; obstacles = []; }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (gameState === 'LOADING') {
                ctx.fillStyle = "white"; ctx.font = "50px Arial"; ctx.textAlign = "center";
                ctx.fillText("Lade Team Yellow Assets: " + Math.floor((loadedCount/totalAssets)*100) + "%", 540, 960);
            } else if (gameState === 'START') {
                if(images.sc_start.complete) ctx.drawImage(images.sc_start, 0, 0, 1080, 1920);
            } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
                let bg = gameState === 'BOSS' ? images.bg4 : images['bg1']; // Vereinfacht für Test
                ctx.drawImage(bg, 0, backgroundY, 1080, 1920);
                ctx.drawImage(bg, 0, backgroundY - 1920, 1080, 1920);
                if (gameState === 'BOSS') ctx.drawImage(images.boss, 340, 200, 400, 400);
                let char = selectedGender === 'm' ? images.runner_m : images.runner_f;
                ctx.drawImage(char, 360 * playerLane + 50, 1400, 260, 320);
                obstacles.forEach(o => {
                    let img = o.type === 'gate' ? images.gate : images.agent;
                    ctx.drawImage(img, 360 * o.lane + 55, o.y, 250, 250);
                });
                projectiles.forEach(p => ctx.drawImage(images.proj_ty, 360 * p.lane + 130, p.y, 100, 200));
            } else if (gameState === 'GAMEOVER') ctx.drawImage(images.sc_gameover, 0, 0, 1080, 1920);
            else if (gameState === 'VICTORY') ctx.drawImage(images.sc_victory, 0, 0, 1080, 1920);

            requestAnimationFrame(draw);
        }
        setInterval(update, 1000/60); draw();
    </script>
</body>
</html>
