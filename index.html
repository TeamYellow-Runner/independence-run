<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Team Yellow - Independence Run</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden !important; position: fixed; background-color: #000; display: flex; justify-content: center; align-items: center; }
        #game-container { position: relative; width: 100vw; height: 177.78vw; max-width: 56.25vh; max-height: 100vh; background: #111; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #FFD700; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: sans-serif; font-size: 30px; z-index: 2000; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading-overlay">LADE TEAM YELLOW...<br><span id="percent" style="font-size: 20px;">0%</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1080; canvas.height = 1920;

// --- CONFIG & BALANCING ---
const levelGoals = [150, 400, 800]; // Punkte für Level 1, 2, 3
const levelTimes = [45, 60, 75];    // Sekunden für Level 1, 2, 3

let gameState = 'LOADING', score = 0, playerHP = 3, bossHP = 10;
let currentLevel = 1, playerLane = 1, bossLane = 1, selectedGender = 'm';
let gameSpeed = 18, frameCount = 0, timeLeft = 0;
const channelLink = "https://whatsapp.com/channel/0029Vakref7E50Uf6qbO6545";

const images = {}, audio = {};
let loadedAssets = 0;
const assets = {
    bg1: 'bg_1.png', bg2: 'bg_2.png', bg3: 'bg_3.png', bg4: 'bg_4.png',
    runner_m: 'runner_m.png', runner_f: 'runner_f.png',
    agent: 'enemy_agent.png', boss: 'boss_ceo.png',
    gate: 'item_gate.png', proj_ty: 'proj_ty.png', proj_syn: 'proj_syn.png',
    sc_start: 'sc_start.png', sc_gameover: 'sc_gameover.png', sc_victory: 'sc_victory.png',
    ui_hp: 'ui_hp.png', ui_score: 'ui_score.png', fx_shadow: 'fx_shadow.png'
};

function initLoad() {
    const total = Object.keys(assets).length;
    for (let key in assets) {
        images[key] = new Image();
        images[key].onload = () => {
            loadedAssets++;
            document.getElementById('percent').innerText = Math.floor((loadedAssets/total)*100) + "%";
            if(loadedAssets >= total) {
                setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; gameState = 'START'; }, 800);
            }
        };
        images[key].src = assets[key];
    }
    audio.main = new Audio('music_main_loop.mp3'); audio.main.loop = true;
    audio.win = new Audio('music_victory.mp3'); audio.lose = new Audio('music_gameover.mp3');
}
initLoad();

let obstacles = [], projectiles = [], bossProjectiles = [], audioUnlocked = false;

function handleInteraction(e) {
    if(e.cancelable) e.preventDefault();
    if (!audioUnlocked) { audio.main.play().then(() => { audio.main.pause(); audio.main.currentTime = 0; }).catch(()=>{}); audioUnlocked = true; }
    const rect = canvas.getBoundingClientRect();
    const cX = (e.touches ? e.touches[0].clientX : e.clientX);
    const cY = (e.touches ? e.touches[0].clientY : e.clientY);
    const x = (cX - rect.left) * (canvas.width / rect.width);
    const y = (cY - rect.top) * (canvas.height / rect.height);

    if (gameState === 'START') {
        if (y < 1600) { selectedGender = (x < 540) ? 'm' : 'f'; startGame(); }
        else { window.open(channelLink, '_blank'); }
    } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        if (x < 360) playerLane = 0; else if (x > 720) playerLane = 2; else playerLane = 1;
        if (gameState === 'BOSS') projectiles.push({lane: playerLane, y: 1500});
    } else if (gameState === 'GAMEOVER' || gameState === 'VICTORY') {
        location.reload(); 
    }
}
canvas.addEventListener('mousedown', handleInteraction);
canvas.addEventListener('touchstart', handleInteraction, {passive: false});

function startGame() {
    gameState = 'PLAYING'; score = 0; currentLevel = 1; playerHP = 3; bossHP = 10;
    obstacles = []; projectiles = []; bossProjectiles = [];
    timeLeft = levelTimes[0];
    audio.main.play().catch(() => {});
}

function update() {
    if (gameState === 'PLAYING' || gameState === 'BOSS') {
        frameCount++;
        
        // Timer Logik
        if (gameState === 'PLAYING') {
            timeLeft -= 1/60; 
            if (timeLeft <= 0) { gameState = 'GAMEOVER'; audio.main.pause(); audio.lose.play(); }
        }

        // Spawning
        if (gameState === 'PLAYING' && frameCount % 65 === 0) {
            let type = (Math.random() > 0.4) ? 'gate' : 'agent';
            obstacles.push({type: type, lane: Math.floor(Math.random()*3), y: -300});
        }
        if (gameState === 'BOSS') {
            if (frameCount % 80 === 0) bossLane = Math.floor(Math.random()*3);
            if (frameCount % 60 === 0) bossProjectiles.push({lane: bossLane, y: 400});
        }

        obstacles.forEach((o, i) => {
            o.y += gameSpeed;
            if (o.y > 1400 && o.y < 1700 && o.lane === playerLane) {
                if (o.type === 'gate') { score += 20; obstacles.splice(i, 1); }
                else if (o.type === 'agent') { score = Math.max(0, score - 25); obstacles.splice(i, 1); }
            }
            if (o.y > 2000) obstacles.splice(i, 1);
        });

        bossProjectiles.forEach((bp, i) => {
            bp.y += gameSpeed + 6;
            if (bp.y > 1400 && bp.y < 1700 && bp.lane === playerLane) {
                playerHP--; bossProjectiles.splice(i, 1);
                if(playerHP <= 0) { gameState = 'GAMEOVER'; audio.main.pause(); audio.lose.play(); }
            }
            if (bp.y > 2000) bossProjectiles.splice(i, 1);
        });

        projectiles.forEach((p, i) => {
            p.y -= 45;
            if (gameState === 'BOSS' && p.y < 500 && p.lane === bossLane) {
                bossHP--; projectiles.splice(i, 1);
                if (bossHP <= 0) { gameState = 'VICTORY'; audio.main.pause(); audio.win.play(); }
            }
            if (p.y < -100) projectiles.splice(i, 1);
        });

        // Level-Check
        if (gameState === 'PLAYING') {
            let goal = levelGoals[currentLevel-1];
            if (score >= goal) {
                if (currentLevel < 3) {
                    currentLevel++;
                    timeLeft = levelTimes[currentLevel-1];
                    gameSpeed += 2; // Tempo zieht an
                } else {
                    gameState = 'BOSS';
                    obstacles = [];
                }
            }
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (gameState === 'START') {
        if(images.sc_start.complete) ctx.drawImage(images.sc_start, 0, 0, 1080, 1920);
    } else if (gameState === 'PLAYING' || gameState === 'BOSS') {
        let bg = (gameState === 'BOSS') ? images.bg4 : images['bg' + currentLevel];
        if(bg && bg.complete) ctx.drawImage(bg, 0, 0, 1080, 1920);
        
        if (gameState === 'BOSS' && images.boss.complete) {
            ctx.drawImage(images.boss, 360 * bossLane + 20, 180, 400, 400);
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(340, 130, 400, 25);
            ctx.fillStyle = "red"; ctx.fillRect(340, 130, 40 * bossHP, 25);
        }

        if(images.fx_shadow.complete) ctx.drawImage(images.fx_shadow, 360 * playerLane + 80, 1650, 200, 100);
        let char = images['runner_' + selectedGender];
        if(char && char.complete) ctx.drawImage(char, 360 * playerLane + 40, 1380, 280, 340);
        
        obstacles.forEach(o => {
            let img = (o.type === 'gate') ? images.gate : images.agent;
            if(img.complete) ctx.drawImage(img, 360 * o.lane + 55, o.y, 250, 250);
        });

        bossProjectiles.forEach(bp => { if(images.proj_syn.complete) ctx.drawImage(images.proj_syn, 360 * bp.lane + 80, bp.y, 200, 200); });
        projectiles.forEach(p => { if(images.proj_ty.complete) ctx.drawImage(images.proj_ty, 360 * p.lane + 130, p.y, 100, 200); });

        // UI
        let ui = (gameState === 'BOSS') ? images.ui_hp : images.ui_score;
        if(ui.complete) {
            ctx.drawImage(ui, 50, 50, 400, 150);
            ctx.fillStyle = "black"; ctx.font = "bold 70px Arial"; ctx.textAlign = "center";
            ctx.fillText((gameState === 'BOSS' ? playerHP : score), 285, 148);
            
            // Timer Anzeige (nur in Level 1-3)
            if (gameState === 'PLAYING') {
                ctx.fillStyle = timeLeft < 10 ? "red" : "white";
                ctx.font = "bold 60px Arial";
                ctx.fillText("ZEIT: " + Math.ceil(timeLeft) + "s", 850, 145);
            }
        }
    } else if (gameState === 'GAMEOVER') {
        if(images.sc_gameover.complete) ctx.drawImage(images.sc_gameover, 0, 0, 1080, 1920);
    } else if (gameState === 'VICTORY') {
        if(images.sc_victory.complete) ctx.drawImage(images.sc_victory, 0, 0, 1080, 1920);
    }
    requestAnimationFrame(draw);
}
setInterval(update, 1000/60); draw();
</script>
</body>
</html>
